<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Image Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="slider">
        <h2>Image Slider</h2>
        
        <div class="main-box">
            <img id="my-img" src="" alt="slider">
            
            <button id="left-btn" class="btn" onclick="prevSlide()">&lt;</button>
            <button id="right-btn" class="btn" onclick="nextSlide()">&gt;</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
