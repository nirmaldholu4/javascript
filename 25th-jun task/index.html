<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Library Management System</h1>

    <h2>Total Books : <span id="totalBooks">0</span></h2>

    <div class="buttons">

        <button onclick="displayBooks()">Display All</button>

        <button onclick="addBook()">Add NewBook</button>

        <button onclick="updateBook()">Update Book</button>

        <button onclick="deleteBook()">Delete Data</button>

        <button onclick="issueBook()">Issue Book</button>

        <button onclick="returnBook()">Return Book</button>

        <button onclick="bookStatus()">Book Status</button>

    </div>

    <table>

        <thead>

            <tr>

                <th>ID</th>
                <th>Book Name</th>
                <th>Author</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Status</th>

            </tr>

        </thead>

        <tbody id="bookTable">

        </tbody>

    </table>

    <script src="script.js"></script>

</body>
</html>
